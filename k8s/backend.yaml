apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 192.168.9.221:5000/aiops-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aiops-config
            - secretRef:
                name: aiops-secret
          volumeMounts:
            - name: reports
              mountPath: /app/reports
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: aiops-reports-pvc
        - name: data
          persistentVolumeClaim:
            claimName: aiops-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aiops
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
