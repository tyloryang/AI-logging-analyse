apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: init-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /mnt/data
              [ -f /mnt/cmdb_hosts.json ]      || echo '{}'  > /mnt/cmdb_hosts.json
              [ -f /mnt/ssh_credentials.json ] || echo '[]'  > /mnt/ssh_credentials.json
          volumeMounts:
            - name: data
              mountPath: /mnt
      containers:
        - name: backend
          image: 192.168.9.221:5000/aiops-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUTF8
              value: "1"
            - name: PYTHONIOENCODING
              value: UTF-8
            - name: LANG
              value: C.UTF-8
            - name: LC_ALL
              value: C.UTF-8
          envFrom:
            - configMapRef:
                name: aiops-config
            - secretRef:
                name: aiops-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: data
            - name: data
              mountPath: /app/cmdb_hosts.json
              subPath: cmdb_hosts.json
            - name: data
              mountPath: /app/ssh_credentials.json
              subPath: ssh_credentials.json
            - name: reports
              mountPath: /app/reports
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aiops-data-pvc
        - name: reports
          persistentVolumeClaim:
            claimName: aiops-reports-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aiops
spec:
  selector:
    app: backend
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
