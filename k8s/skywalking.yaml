apiVersion: v1
kind: Service
metadata:
  name: skywalking-banyandb
  namespace: monitoring
spec:
  selector:
    app: skywalking-banyandb
  ports:
    - name: grpc
      port: 17912
      targetPort: 17912
    - name: http
      port: 17913
      targetPort: 17913
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-banyandb
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-banyandb
  template:
    metadata:
      labels:
        app: skywalking-banyandb
    spec:
      containers:
        - name: banyandb
          image: 192.168.9.221:5000/skywalking-banyandb:0.10.2
          imagePullPolicy: Always
          args:
            - standalone
            - --measure-root-path
            - /var/lib/banyandb/data/measure
            - --stream-root-path
            - /var/lib/banyandb/data/stream
          ports:
            - name: grpc
              containerPort: 17912
            - name: http
              containerPort: 17913
          volumeMounts:
            - name: data
              mountPath: /var/lib/banyandb/data
          readinessProbe:
            tcpSocket:
              port: 17912
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 17912
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: skywalking-banyandb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-oap
  namespace: monitoring
spec:
  selector:
    app: skywalking-oap
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
    - name: http
      port: 12800
      targetPort: 12800
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-oap-nodeport
  namespace: monitoring
spec:
  selector:
    app: skywalking-oap
  type: NodePort
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
      nodePort: 31180
    - name: http
      port: 12800
      targetPort: 12800
      nodePort: 31280
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-oap
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skywalking-oap
  template:
    metadata:
      labels:
        app: skywalking-oap
    spec:
      containers:
        - name: oap
          image: apache/skywalking-oap-server:10.4.0
          imagePullPolicy: Always
          env:
            - name: SW_STORAGE
              value: banyandb
            - name: SW_STORAGE_BANYANDB_TARGETS
              value: skywalking-banyandb.monitoring.svc.cluster.local:17912
            - name: SW_HEALTH_CHECKER
              value: default
            - name: SW_OTEL_RECEIVER
              value: default
            - name: JAVA_OPTS
              value: -Xms512m -Xmx1024m
          ports:
            - name: grpc
              containerPort: 11800
            - name: http
              containerPort: 12800
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 12800
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 12800
            initialDelaySeconds: 80
            periodSeconds: 20
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 2Gi
