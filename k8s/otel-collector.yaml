apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: default
spec:
  mode: deployment
  replicas: 1
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      batch:
        send_batch_size: 10000
        timeout: 10s
    exporters:
      debug: {}
      otlp/jaeger:
        endpoint: jaeger.default.svc.cluster.local:4317
        tls:
          insecure: true
      otlp/skywalking:
        endpoint: skywalking-oap.monitoring.svc.cluster.local:11800
        tls:
          insecure: true
    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers:
            - otlp
          processors: []
          exporters:
            - debug
            - otlp/jaeger
            - otlp/skywalking
