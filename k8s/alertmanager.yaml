# AlertManager 部署（独立，不依赖 Prometheus Operator）
# namespace: monitoring
# 接收 Prometheus 告警，转发到 AIOps Webhook
#
# 使用方式：
#   kubectl apply -f k8s/alertmanager.yaml
#
# 访问地址：http://192.168.9.221:30093
# AIOps Webhook：http://192.168.9.221:30800/api/alerts/webhook

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: monitoring

---
# AlertManager 配置（ConfigMap）
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # 如需 SMTP 邮件通知，填写以下配置
      # smtp_smarthost: 'smtp.example.com:587'
      # smtp_from: 'alertmanager@example.com'
      # smtp_auth_username: 'user'
      # smtp_auth_password: 'pass'

    # 告警模板路径
    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    # 路由规则
    route:
      # 默认接收器
      receiver: aiops-webhook
      # 分组标签（相同 alertname+namespace 聚合）
      group_by: ['alertname', 'namespace', 'service']
      group_wait: 30s        # 等待分组收集
      group_interval: 5m     # 同组告警间隔
      repeat_interval: 4h    # 同一告警重复发送间隔

      routes:
        # Critical 告警立即发送，不等待
        - matchers:
            - severity = "critical"
          receiver: aiops-webhook
          group_wait: 10s
          repeat_interval: 1h

        # Watchdog（心跳告警）静默，不发送
        - matchers:
            - alertname = "Watchdog"
          receiver: blackhole

        # InfoInhibitor 静默
        - matchers:
            - alertname = "InfoInhibitor"
          receiver: blackhole

    # 抑制规则：critical 存在时抑制 warning
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'namespace', 'service']

    receivers:
      # AIOps 平台 Webhook（主接收器）
      - name: aiops-webhook
        webhook_configs:
          - url: 'http://backend.aiops.svc.cluster.local:8000/api/alerts/webhook'
            send_resolved: true
            max_alerts: 50
            http_config:
              follow_redirects: true

      # 黑洞（丢弃）
      - name: blackhole

  # 告警模板
  default.tmpl: |
    {{ define "aiops.summary" -}}
    [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
    服务: {{ .CommonLabels.service | default "unknown" }}
    告警数: {{ len .Alerts }}
    {{- end }}

---
# AlertManager 数据持久化
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data-pvc
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi

---
# AlertManager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.external-url=http://192.168.9.221:30093'
            - '--web.route-prefix=/'
            - '--cluster.advertise-address=$(POD_IP):9094'
            - '--log.level=info'
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: web
              containerPort: 9093
            - name: cluster
              containerPort: 9094
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: templates
              mountPath: /etc/alertmanager/templates
            - name: data
              mountPath: /alertmanager
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
            items:
              - key: alertmanager.yml
                path: alertmanager.yml
        - name: templates
          configMap:
            name: alertmanager-config
            items:
              - key: default.tmpl
                path: default.tmpl
        - name: data
          persistentVolumeClaim:
            claimName: alertmanager-data-pvc

---
# AlertManager Service（NodePort 30093）
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  type: NodePort
  ports:
    - name: web
      port: 9093
      targetPort: 9093
      nodePort: 30093
    - name: cluster
      port: 9094
      targetPort: 9094
