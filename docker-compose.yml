services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/cmdb_hosts.json:/app/cmdb_hosts.json
      - ./backend/ssh_credentials.json:/app/ssh_credentials.json

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
