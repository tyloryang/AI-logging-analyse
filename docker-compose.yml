services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/cmdb_hosts.json:/app/cmdb_hosts.json
      - ./backend/ssh_credentials.json:/app/ssh_credentials.json
      - aiops_data:/app/data          # SQLite 数据库目录
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Grafana（docker compose --profile grafana up）──
  grafana:
    image: grafana/grafana:latest
    profiles: [grafana]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 允许 iframe 嵌入（AIOps 平台 Grafana 看板功能必需）
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # 关闭登录页面（内网可选，生产环境请删除此行）
      # GF_AUTH_ANONYMOUS_ENABLED: "true"
      # GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3000}"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      # 允许跨域（前端不同域访问时取消注释）
      # GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 可选：MySQL 8（docker compose --profile mysql up）──
  mysql:
    image: mysql:8
    profiles: [mysql]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aiops
      MYSQL_USER: aiops
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aiops123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # ── 可选：PostgreSQL 16（docker compose --profile postgres up）──
  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiops123}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops"]
      interval: 10s
      retries: 5

volumes:
  redis_data:
  aiops_data:
  mysql_data:
  pg_data:
  grafana_data:
