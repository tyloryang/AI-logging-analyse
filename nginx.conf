worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 500;

    # ── Gzip（不压缩 SSE / EventStream）──────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── FastAPI 后端 upstream ─────────────────────────────────────────────────
    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS 跳转（可选，去掉注释即启用）────────────────────────────
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name your-domain.com;   # 改成实际域名或 IP

        # HTTPS 配置（可选）
        # listen 443 ssl http2;
        # ssl_certificate     /etc/ssl/certs/your.crt;
        # ssl_certificate_key /etc/ssl/private/your.key;
        # ssl_protocols       TLSv1.2 TLSv1.3;

        root  /usr/share/nginx/html;   # 指向 dist 目录
        index index.html;

        # ── 安全响应头 ──────────────────────────────────────────────────────
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         SAMEORIGIN;
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         strict-origin-when-cross-origin;

        # ── 静态资源缓存（Vite 构建的 hash 文件名可永久缓存）──────────────
        location ~* /assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html 不缓存（每次检查更新）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── WebSocket：SSH 终端 /api/ws/ssh ────────────────────────────────
        # 必须在通用 /api/ location 之前定义（更精确匹配优先）
        location /api/ws/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;

            # WebSocket 握手升级
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSH 会话可能持续很长时间
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            proxy_buffering off;
        }

        # ── SSE 流式接口（AI 分析 / 巡检 / 慢日志）────────────────────────
        # 匹配所有 /api/**/*stream* 和 /api/**/*inspect*
        location ~* ^/api/.*(stream|inspect|sse) {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";   # 关闭 keep-alive 复用，确保 SSE 独占

            # SSE 关键：关闭 nginx 缓冲，数据直接透传到浏览器
            proxy_buffering              off;
            proxy_cache                  off;
            proxy_read_timeout           600s;   # AI 分析可能耗时较长
            proxy_connect_timeout        10s;

            # 告诉 nginx 不要给这条响应加缓冲（X-Accel-Buffering 由后端控制优先）
            add_header X-Accel-Buffering no;
        }

        # ── 通用 API 代理 /api/ → FastAPI:8000 ────────────────────────────
        location /api/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";   # upstream keepalive 复用

            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;   # Jenkins API / K8s 查询可能较慢
            proxy_send_timeout    30s;

            # 响应头中允许大 token（JWT / Jenkins API token）
            proxy_buffer_size    32k;
            proxy_buffers        8 32k;
            proxy_busy_buffers_size 64k;

            # 后端返回的 5xx 不触发 nginx 自带错误页
            proxy_intercept_errors off;
        }

        # ── Vue Router history 模式：SPA 兜底 ─────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 禁止访问隐藏文件 ────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
        }
    }
}
