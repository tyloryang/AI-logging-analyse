</text>
<text x="911" y="516" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="911" dy="0">• 报告导出 / 定时巡检</tspan>
</text>
<text x="911" y="550" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="911" dy="0">• 变更动作需人工确认</tspan>
</text>
</g>
