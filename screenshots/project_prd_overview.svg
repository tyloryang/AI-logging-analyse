<rect x="535" y="228" width="338" height="166" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="535" y="228" width="6" height="166" rx="3" fill="#10a37f"/>
<rect x="777" y="244" width="80" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="817.0" y="263" text-anchor="middle" fill="#10a37f" font-size="12" font-weight="700">Notify</text>
<text x="555" y="266" fill="#111827" font-size="20" font-weight="800">告警治理</text>
<text x="555" y="298" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="555" dy="0">• 接入 AlertManager / Webhook</tspan>
</text>
<text x="555" y="332" fill="#6b7280" font-size="15" font-weight="400">
