<text x="822.0" y="447" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="700">Asset</text>
<text x="555" y="450" fill="#111827" font-size="20" font-weight="800">资源与平台</text>
<text x="555" y="482" fill="#6b7280" font-size="15" font-weight="400">
