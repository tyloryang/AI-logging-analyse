<text x="60" y="74" fill="#111827" font-size="34" font-weight="900">AIOps 智能运维平台 PRD</text>
<text x="60" y="108" fill="#6b7280" font-size="16">面向 DevOps / SRE，把告警治理、根因分析、自动化处置和复盘沉淀做成闭环</text>
<g><rect x="1915" y="44" width="62" height="32" rx="16" fill="#f3f4f6" stroke="#e5e7eb"/><text x="1946.0" y="65" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">v1.0</text></g>
<g><rect x="2040" y="44" width="94" height="32" rx="16" fill="#ecfdf5" stroke="#bbf7d0"/><text x="2087.0" y="65" text-anchor="middle" fill="#10a37f" font-size="13" font-weight="600">产品图谱</text></g>
<g><rect x="60" y="150" width="430" height="1390" rx="18" fill="#ffffff" stroke="#e5e7eb"/><rect x="60" y="150" width="6" height="1390" rx="3" fill="#10a37f"/><text x="82" y="184" fill="#6b7280" font-size="13" font-weight="700" letter-spacing="0.08em">PRODUCT CONTEXT</text><text x="82" y="212" fill="#111827" font-size="23" font-weight="800">为什么要做</text></g>
<g><rect x="515" y="150" width="1090" height="1390" rx="18" fill="#ffffff" stroke="#e5e7eb"/><rect x="515" y="150" width="6" height="1390" rx="3" fill="#10a37f"/><text x="537" y="184" fill="#6b7280" font-size="13" font-weight="700" letter-spacing="0.08em">CORE SCOPE</text><text x="537" y="212" fill="#111827" font-size="23" font-weight="800">做什么</text></g>
<g><rect x="1630" y="150" width="710" height="1390" rx="18" fill="#ffffff" stroke="#e5e7eb"/><rect x="1630" y="150" width="6" height="1390" rx="3" fill="#10a37f"/><text x="1652" y="184" fill="#6b7280" font-size="13" font-weight="700" letter-spacing="0.08em">ROADMAP</text><text x="1652" y="212" fill="#111827" font-size="23" font-weight="800">怎么落地</text></g>
<g>
<rect x="78" y="250" width="394" height="278" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="78" y="250" width="6" height="278" rx="3" fill="#2563eb"/>
<rect x="396" y="266" width="60" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="426.0" y="285" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="700">Pain</text>
<text x="98" y="288" fill="#111827" font-size="20" font-weight="800">背景痛点</text>
<text x="98" y="320" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 告警噪音高，重复告警多</tspan>
</text>
<text x="98" y="354" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 日志 / 指标 / Trace 分散</tspan>
</text>
<text x="98" y="388" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 故障定位依赖人工拼接</tspan>
</text>
<text x="98" y="422" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 夜间响应慢，排障成本高</tspan>
</text>
</g>
<g>
<rect x="78" y="548" width="394" height="242" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="78" y="548" width="6" height="242" rx="3" fill="#f97316"/>
<rect x="386" y="564" width="70" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="421.0" y="583" text-anchor="middle" fill="#f97316" font-size="12" font-weight="700">Users</text>
<text x="98" y="586" fill="#111827" font-size="20" font-weight="800">目标用户</text>
<text x="98" y="618" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• SRE / DevOps / 开发</tspan>
</text>
<text x="98" y="652" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 管理层关注日报与健康分</tspan>
</text>
<text x="98" y="686" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 飞书里直接触发分析和协作</tspan>
</text>
</g>
<g>
<rect x="78" y="810" width="394" height="258" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="78" y="810" width="6" height="258" rx="3" fill="#10a37f"/>
<rect x="396" y="826" width="60" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="426.0" y="845" text-anchor="middle" fill="#10a37f" font-size="12" font-weight="700">Rule</text>
<text x="98" y="848" fill="#111827" font-size="20" font-weight="800">产品原则</text>
<text x="98" y="880" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• AI 仅给建议，动作需人审</tspan>
</text>
<text x="98" y="914" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 不自研监控采集，复用现有体系</tspan>
</text>
<text x="98" y="948" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 不替代 IM，只做通知与协作入口</tspan>
</text>
<text x="98" y="982" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 优先做高频、可闭环的场景</tspan>
</text>
</g>
<g>
<rect x="78" y="1088" width="394" height="252" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="78" y="1088" width="6" height="252" rx="3" fill="#7c3aed"/>
<rect x="406" y="1104" width="50" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="431.0" y="1123" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="700">KPI</text>
<text x="98" y="1126" fill="#111827" font-size="20" font-weight="800">验收指标</text>
<text x="98" y="1158" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 30 秒内输出初步 RCA</tspan>
</text>
<text x="98" y="1192" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 同因 20 条告警收敛为 1 张卡</tspan>
</text>
<text x="98" y="1226" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 每日 9:00 自动生成运维日报</tspan>
</text>
<text x="98" y="1260" fill="#6b7280" font-size="15" font-weight="400">
  <tspan x="98" dy="0">• 资源按分组隔离可见</tspan>
</text>
</g>
